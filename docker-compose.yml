version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: conch-postgres
    environment:
      POSTGRES_USER: conch
      POSTGRES_PASSWORD: conch
      POSTGRES_DB: conch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for events
  redis:
    image: redis:7-alpine
    container_name: conch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rust API Server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conch-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://conch:conch@postgres:5432/conch
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      JWT_SECRET: conch-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (to be added)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - api

volumes:
  postgres_data:
  redis_data:
